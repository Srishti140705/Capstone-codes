<!DOCTYPE html>
<html>
<head>
    <title>Add Two Numbers</title>
</head>
<body>

Enter 1st Number:
<input type="number" id="n1">
<br><br>

Enter 2nd Number:
<input type="number" id="n2">
<br><br>

<button onclick="addNumbers()">Add</button>

<script>
    function addNumbers() {
        var a = Number(document.getElementById("n1").value);
        var b = Number(document.getElementById("n2").value);

        var sum = a + b;

        alert("Sum = " + sum);
    }
</script>

</body>
</html>
